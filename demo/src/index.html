<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Killer Sudoku Visualizer</title>
		<link href="./output.css" rel="stylesheet" />
	</head>
	<body class="app-shell theme-light">
		<header class="app-header">
			<div class="title-block">
				<p class="eyebrow">CS106 Sudoku-Bench Demo</p>
				<h1>Killer Sudoku LLM Reasoning Visualizer</h1>
			</div>

			<div class="control-grid">
				<div class="control-field theme-field">
					<span>Theme</span>
					<button id="theme-toggle" class="icon-button" type="button" aria-label="Switch theme" title="Switch theme"></button>
				</div>

				<label class="control-field">
					<span>Model</span>
					<select id="model-select"></select>
				</label>

				<label class="control-field">
					<span>Map</span>
					<select id="puzzle-select"></select>
				</label>

				<label class="control-field speed-field">
					<span>Speed: <strong id="speed-label">1.0s</strong></span>
					<input id="speed-range" type="range" min="300" max="2500" step="100" value="1000" />
				</label>
			</div>
		</header>

		<main class="demo-layout">
			<section class="board-panel">
				<div class="panel-heading">
					<h2 id="puzzle-title-solution">Solution Board</h2>
					<span class="panel-tag" id="puzzle-meta">Loading...</span>
				</div>
				<div id="solution-board" class="sudoku-board" aria-label="Solution board"></div>
			</section>

			<section class="board-panel">
				<div class="panel-heading">
					<h2 id="puzzle-title-current">Current Board</h2>
					<span class="panel-tag" id="model-meta">Loading...</span>
				</div>
				<div id="current-board" class="sudoku-board" aria-label="Current board"></div>
			</section>

			<section class="reasoning-panel">
				<div class="reasoning-header">
					<div>
						<h2>AI Reasoning Stream</h2>
						<p id="step-counter">Step 0/0</p>
					</div>
					<span id="status-badge" class="status-badge hidden"></span>
				</div>

				<div id="reasoning-container" class="reasoning-container">
					<div class="empty-state">Choose a model and map, then start the simulation.</div>
				</div>
			</section>
		</main>

		<footer class="action-bar">
			<div class="nav-actions">
				<button id="btn-prev" class="ghost-button" type="button">Previous Map</button>
				<button id="btn-next" class="ghost-button" type="button">Next Map</button>
			</div>
			<div class="run-actions">
				<button id="btn-step" class="ghost-button" type="button">Step</button>
				<button id="btn-start" class="primary-button" type="button">Start</button>
				<button id="btn-reset" class="ghost-button" type="button">Reset</button>
			</div>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
